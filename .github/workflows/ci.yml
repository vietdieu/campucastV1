name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm install
      - run: npm run lint
      - run: npm run lint:hardcoded-colors
      - run: npm run build
      - name: Run tests with coverage
        run: npx c8 --include='src/domain/runtime/**/*.ts' --lines 60 --check-coverage npx tsx tests/run-all-tests.ts
